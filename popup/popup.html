<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <h1>SoL Live Dashboard</h1>

    <div class="row">
      <span class="label">State</span>
      <span id="state" class="pill idle">idle</span>
      <span id="lastok" class="muted"></span>
    </div>
    <div id="msg" class="msg"></div>

    <div class="row"><span class="label">Players</span><span id="count">0</span></div>
    <div class="row"><span class="label">Target</span><span id="target" class="muted truncate"></span></div>
    <div class="row"><span class="label">Publish</span><span id="pub" class="muted"></span></div>

    <div class="buttons">
      <button id="toggle" data-on="0">Start polling</button>
      <button id="now">Poll now</button>
    </div>
    <div class="buttons">
      <button id="dash">Open dashboard</button>
      <button id="opts">Options</button>
    </div>
    <div class="buttons">
      <button id="export">Export debug</button>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
